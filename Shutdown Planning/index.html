<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary: #0F204B; --bg: #f4f7f9; }
    body { background-color: var(--bg); font-family: 'Inter', sans-serif; padding-bottom: 90px; }
    
    /* Desktop Excel Grid Styles */
    @media (min-width: 992px) {
      .grid-container { background: white; overflow: auto; max-height: 70vh; border: 1px solid #ddd; }
      .excel-table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
      .excel-table th { position: sticky; top: 0; background: #f8f9fa; z-index: 10; border: 1px solid #ddd; padding: 8px; font-size: 0.75rem; text-align: center; }
      .excel-table td { border: 1px solid #eee; padding: 2px; }
      .grid-input { border: none; width: 100%; height: 35px; padding: 5px; font-size: 0.85rem; outline: none; }
      .grid-input:focus { background: #e8f0fe; }
      .mobile-only { display: none !important; }
    }

    /* Mobile Card Styles */
    @media (max-width: 991px) {
      .desktop-only { display: none !important; }
      .card-custom { background: white; border-radius: 12px; padding: 15px; border: 1px solid rgba(0,0,0,0.05); margin-bottom: 15px; }
    }

    .nav-tabs-custom { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 -3px 15px rgba(0,0,0,0.08); z-index: 1000; }
    .loader-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.9); z-index: 10001; display: none; align-items: center; justify-content: center; flex-direction: column; }
    #loginScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>

<div id="loader" class="loader-overlay"><div class="spinner-border text-primary mb-2"></div><div id="lText">Processing...</div></div>

<div id="loginScreen">
  <div class="card p-4 shadow" style="width: 330px;">
    <h4 class="text-center mb-4 text-primary fw-bold">SHUTDOWN PRO</h4>
    <input type="text" id="lCode" class="form-control mb-2" placeholder="Emp Code">
    <div class="input-group mb-4">
      <input type="password" id="lPass" class="form-control" placeholder="Password">
      <button class="btn btn-outline-secondary" type="button" onclick="togglePass()"><i id="pIcon" class="bi bi-eye"></i></button>
    </div>
    <button class="btn btn-primary w-100 fw-bold" onclick="auth()">LOGIN</button>
    <div id="lMsg" class="text-danger mt-2 text-center small"></div>
  </div>
</div>

<div id="app" style="display:none;" class="container-fluid pt-3">
  <div class="d-flex justify-content-between align-items-center mb-3 bg-white p-2 rounded shadow-sm">
    <div class="fw-bold"><i class="bi bi-person-circle"></i> <span id="uName"></span></div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-primary" onclick="downloadFormat()"><i class="bi bi-download"></i> Format</button>
      <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="desktop-only grid-container card shadow-sm">
    <table class="excel-table" id="excelTable">
      <thead>
        <tr>
          <th style="width: 40px;">#</th>
          <th style="width: 150px;">Zone</th>
          <th style="width: 150px;">Circle</th>
          <th style="width: 150px;">Division</th>
          <th style="width: 150px;">Substation</th>
          <th style="width: 200px;">Feeder</th>
          <th style="width: 100px;">Type</th>
          <th style="width: 130px;">Date</th>
          <th style="width: 80px;">From</th>
          <th style="width: 80px;">To</th>
          <th style="width: 80px;">Hrs</th>
          <th style="width: 200px;">Reason</th>
          <th style="width: 40px;">Action</th>
        </tr>
      </thead>
      <tbody id="desktopGridBody"></tbody>
    </table>
  </div>

  <div id="mobileRows" class="mobile-only"></div>

  <div class="mt-4 p-2">
    <button class="btn btn-success btn-sm mb-2 w-100" onclick="addRow()"><i class="bi bi-plus-circle"></i> Add More Rows</button>
    <button class="btn btn-primary w-100 py-3 fw-bold shadow" onclick="submit()">FINALIZE & SUBMIT WEEKLY PLAN</button>
  </div>
</div>

<div class="nav-tabs-custom" id="bottomNav" style="display:none;">
  <button class="btn btn-link nav-btn active" onclick="location.reload()"><i class="bi bi-pencil-square"></i> New</button>
  <button class="btn btn-link nav-btn" onclick="document.getElementById('fileUp').click()"><i class="bi bi-upload"></i> Upload</button>
  <input type="file" id="fileUp" hidden accept=".xlsx, .csv" onchange="handleUpload(event)">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbxfS1SvQsdmuQVe3zKHDmMAUiXB-LUr8b_ybiVFOhjkPRjFWmjS_zFmIlsVs2Zsq6S-WA/exec";
  let MASTER = []; let TYPES = []; let USER = {}; let RID = 0;

  window.onload = () => {
    const saved = localStorage.getItem('creds');
    if(saved) {
      const c = JSON.parse(saved);
      document.getElementById('lCode').value = c.empCode;
      document.getElementById('lPass').value = c.password;
      auth();
    }
  };

  function auth() {
    const code = document.getElementById('lCode').value;
    const pass = document.getElementById('lPass').value;
    if(!code || !pass) return;
    setLoader(true, "Authenticating...");
    fetch(API_URL, {method:"POST", body:JSON.stringify({action:'login', empCode:code, password:pass})})
    .then(r => r.json()).then(res => {
      if(res.status==='success') {
        USER = res; localStorage.setItem('creds', JSON.stringify({empCode:code, password:pass}));
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('app').style.display='block';
        document.getElementById('bottomNav').style.display='flex';
        document.getElementById('uName').innerText = res.name;
        loadData();
      } else { setLoader(false); document.getElementById('lMsg').innerText = res.message; }
    }).catch(() => setLoader(false));
  }

  function loadData() {
    fetch(API_URL, {method:"POST", body:JSON.stringify({action:'getAppData'})})
    .then(r => r.json()).then(res => {
      MASTER = res.hierarchy; TYPES = res.feederTypes;
      for(let i=0; i<7; i++) addRow();
      setLoader(false);
    });
  }

  function addRow(data = null) {
    RID++; const id = RID;
    // DESKTOP GRID ROW
    const dtr = document.createElement('tr'); dtr.id = `dr-${id}`;
    dtr.innerHTML = `
      <td>${id}</td>
      <td><select class="grid-input s-z" onchange="sync(${id},'z')"><option value="">Select</option></select></td>
      <td><select class="grid-input s-c" onchange="sync(${id},'c')"><option value="">Select</option></select></td>
      <td><select class="grid-input s-d" onchange="sync(${id},'d')"><option value="">Select</option></select></td>
      <td><select class="grid-input s-s" onchange="sync(${id},'s')"><option value="">Select</option></select></td>
      <td><select class="grid-input s-f"><option value="">Select</option></select></td>
      <td><select class="grid-input s-t"></select></td>
      <td><input type="date" class="grid-input v-date"></td>
      <td><input type="time" class="grid-input v-from" onchange="calc(${id})"></td>
      <td><input type="time" class="grid-input v-to" onchange="calc(${id})"></td>
      <td><input type="text" class="grid-input v-h readonly-box" readonly></td>
      <td><input type="text" class="grid-input v-r" placeholder="Reason"></td>
      <td class="text-center"><i class="bi bi-copy text-primary" onclick="copy(${id})" style="cursor:pointer"></i></td>
    `;
    document.getElementById('desktopGridBody').appendChild(dtr);
    
    // Populate Initial Dropdowns
    const zSel = dtr.querySelector('.s-z');
    [...new Set(MASTER.map(x => x[0]))].sort().forEach(z => zSel.innerHTML += `<option value="${z}">${z}</option>`);
    const tSel = dtr.querySelector('.s-t');
    TYPES.forEach(t => tSel.innerHTML += `<option value="${t}">${t}</option>`);

    if(data) fillRow(id, data);
  }

  function fillRow(id, d) {
    const r = document.getElementById(`dr-${id}`);
    r.querySelector('.s-z').value = d.zone || ""; sync(id, 'z');
    r.querySelector('.s-c').value = d.circle || ""; sync(id, 'c');
    r.querySelector('.s-d').value = d.division || ""; sync(id, 'd');
    r.querySelector('.s-s').value = d.substation || ""; sync(id, 's');
    r.querySelector('.s-f').value = d.feeder || "";
    r.querySelector('.s-t').value = d.type || "";
    r.querySelector('.v-date').value = d.date || "";
    r.querySelector('.v-from').value = d.from || "";
    r.querySelector('.v-to').value = d.to || "";
    r.querySelector('.v-r').value = d.reason || "";
    calc(id);
  }

  function sync(id, lv) {
    const r = document.getElementById(`dr-${id}`);
    const v = [r.querySelector('.s-z').value, r.querySelector('.s-c').value, r.querySelector('.s-d').value, r.querySelector('.s-s').value];
    const pop = (cls, idx, f) => {
      const sel = r.querySelector(`.${cls}`); sel.innerHTML = '<option value="">...</option>';
      const filt = MASTER.filter(x => f.every((v, i) => x[i] === v));
      [...new Set(filt.map(x => x[idx]))].sort().forEach(v => sel.innerHTML += `<option value="${v}">${v}</option>`);
    };
    if(lv==='z') pop('s-c', 1, [v[0]]);
    if(lv==='c') pop('s-d', 2, [v[0], v[1]]);
    if(lv==='d') pop('s-s', 3, [v[0], v[1], v[2]]);
    if(lv==='s') pop('s-f', 4, [v[0], v[1], v[2], v[3]]);
  }

  function calc(id) {
    const r = document.getElementById(`dr-${id}`);
    const f = r.querySelector('.v-from').value; const t = r.querySelector('.v-to').value;
    if(f && t) {
      let d = (new Date("1970-01-01 " + t) - new Date("1970-01-01 " + f)) / 3600000;
      r.querySelector('.v-h').value = (d < 0 ? d + 24 : d).toFixed(2);
    }
  }

  function copy(id) {
    const o = document.getElementById(`dr-${id}`);
    const d = {
      zone: o.querySelector('.s-z').value, circle: o.querySelector('.s-c').value, division: o.querySelector('.s-d').value, substation: o.querySelector('.s-s').value,
      feeder: o.querySelector('.s-f').value, type: o.querySelector('.s-t').value, reason: o.querySelector('.v-r').value
    };
    addRow(d);
  }

  function downloadFormat() {
    const csv = "Zone,Circle,Division,Substation Name,Feeder Name,Feeder Type,From(HH:mm),To(HH:mm),Date(YYYY-MM-DD),Reason,Area,DTs\nBULANDSHAHAR,EDC HAPUR,EDD GARHMUK,DATTIYANA_16734,CHATNORA_16734,Urban,10:00,14:00,2026-04-01,Maintenance,Villages,25";
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'Shutdown_Template.csv'; a.click();
  }

  async function handleUpload(e) {
    const file = e.target.files[0]; if(!file) return;
    setLoader(true, "Parsing File...");
    const reader = new FileReader();
    reader.onload = (evt) => {
      const wb = XLSX.read(evt.target.result, {type:'binary'});
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      document.getElementById('desktopGridBody').innerHTML = ''; RID = 0;
      data.forEach(row => {
        addRow({
          zone: row["Zone"], circle: row["Circle"], division: row["Division"], substation: row["Substation Name"],
          feeder: row["Feeder Name"], type: row["Feeder Type"], from: row["From(HH:mm)"], to: row["To(HH:mm)"],
          date: row["Date(YYYY-MM-DD)"], reason: row["Reason"]
        });
      });
      setLoader(false);
    };
    reader.readAsBinaryString(file);
  }

  function submit() {
    const rows = []; const dates = new Set();
    document.querySelectorAll('#desktopGridBody tr').forEach(r => {
      const dt = r.querySelector('.v-date').value; if(dt) dates.add(dt);
      rows.push({
        zone: r.querySelector('.s-z').value, feeder: r.querySelector('.s-f').value, date: dt,
        from: r.querySelector('.v-from').value, to: r.querySelector('.v-to').value, approxHrs: r.querySelector('.v-h').value,
        reason: r.querySelector('.v-r').value, circle: r.querySelector('.s-c').value, division: r.querySelector('.s-d').value,
        substation: r.querySelector('.s-s').value, feederType: r.querySelector('.s-t').value
      });
    });
    if(dates.size < 7) return alert("MINIMUM 7 UNIQUE DAYS REQUIRED FOR WEEKLY PLANNING.");
    setLoader(true, "Saving Submission...");
    fetch(API_URL, {method:"POST", body:JSON.stringify({action:'submitPlan', rows, userName:USER.name})})
    .then(r => r.json()).then(() => { alert("Success!"); location.reload(); });
  }

  function setLoader(s, t) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; document.getElementById('lText').innerText = t; }
  function togglePass() { const p = document.getElementById('lPass'); p.type = p.type === 'password' ? 'text' : 'password'; }
  function logout() { localStorage.removeItem('creds'); location.reload(); }
</script>
</body>
</html>
